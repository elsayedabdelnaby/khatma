# ============================================================
# 📋 ايه هو الملف ده؟
# ============================================================
# ده ملف SAM Template - بيوصف كل البنية التحتية بتاعت المشروع:
# - Lambda Functions (الكود اللي بيشتغل)
# - API Gateway (الباب اللي الموبايل بيدخل منه)
# - DynamoDB Tables (قاعدة البيانات)
# - SQS Queues (طوابير الرسائل)
# - S3 Buckets (تخزين الملفات)
#
# لما بتعمل "sam deploy" - AWS بيقرأ الملف ده وبينشئ كل حاجة
# ============================================================

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Khatma App Backend
  Quran Completion App - Serverless Architecture v2

# ============================================================
# 🌍 Parameters - متغيرات بتتغير حسب البيئة (dev/prod)
# ============================================================
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Environment name (dev or prod)

  FirebaseSSMParam:
    Type: String
    Default: /khatma/firebase-service-account
    Description: SSM Parameter name for Firebase service account

# ============================================================
# ⚙️ Globals - إعدادات مشتركة لكل Lambda Functions
# ============================================================
Globals:
  Function:
    Timeout: 30                  # أقصى وقت للتنفيذ: 30 ثانية
    Runtime: nodejs18.x          # نسخة Node.js
    MemorySize: 256              # الذاكرة: 256 ميجا (كافية)
    Architectures:
      - x86_64
    Environment:
      Variables:
        # كل Lambda هتقدر تقرأ المتغيرات دي
        ENVIRONMENT: !Ref Environment
        USERS_TABLE: !Ref UsersTable
        KHATMAS_TABLE: !Ref KhatmasTable
        KHATMA_PARTS_TABLE: !Ref KhatmaPartsTable
        KHATMA_INVITATIONS_TABLE: !Ref KhatmaInvitationsTable
        KHATMA_TYPES_TABLE: !Ref KhatmaTypesTable
        BANNERS_TABLE: !Ref BannersTable
        NOTIFICATIONS_TABLE: !Ref NotificationsTable
        USER_REMINDERS_TABLE: !Ref UserRemindersTable
        NOTIFICATION_TYPES_TABLE: !Ref NotificationTypesTable
        NOTIFICATIONS_QUEUE_URL: !Ref NotificationsQueue
        INVITATIONS_QUEUE_URL: !Ref InvitationsQueue
        FIREBASE_SSM_PARAM: !Ref FirebaseSSMParam
        BANNER_IMAGES_BUCKET: !Sub khatma-banner-images-${Environment}-${AWS::AccountId}

  # ============================================================
  # 🌐 API Gateway - إعدادات مشتركة
  # ============================================================
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,Accept-Language'"
      # ⚠️ SECURITY: Change AllowOrigin to your domain in prod
      # e.g., "'https://admin.yourdomain.com'"
      AllowOrigin: "'*'"
    Auth:
      DefaultAuthorizer: FirebaseAuthorizer
      AddDefaultAuthorizerToCorsPreflight: false
      Authorizers:
        FirebaseAuthorizer:
          FunctionArn: !GetAtt AuthorizerFunction.Arn

# ============================================================
# 🔀 Conditions
# ============================================================
Conditions:
  IsProd: !Equals [!Ref Environment, prod]

# ============================================================
# 🏗️ Resources - كل الحاجات اللي AWS هينشئها
# ============================================================
Resources:

  # ==========================================================
  # 🌐 Gateway Responses - CORS headers on API Gateway errors
  # ==========================================================
  GatewayResponseDefault4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,Accept-Language'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
      ResponseType: DEFAULT_4XX
      RestApiId: !Ref ServerlessRestApi

  GatewayResponseDefault5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,Accept-Language'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
      ResponseType: DEFAULT_5XX
      RestApiId: !Ref ServerlessRestApi

  # 401/403 from Lambda authorizer use these types; they need CORS too
  GatewayResponseUnauthorized:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,Accept-Language'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
      ResponseType: UNAUTHORIZED
      RestApiId: !Ref ServerlessRestApi

  GatewayResponseAccessDenied:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,Accept-Language'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
      ResponseType: ACCESS_DENIED
      RestApiId: !Ref ServerlessRestApi

  # ==========================================================
  # 🔐 LAMBDA: Firebase Authorizer (حارس الباب)
  # ==========================================================
  # بيشتغل تلقائياً قبل أي request عشان يتحقق من الـ Token
  # لو الـ Token صحيح → يسمح بالـ request
  # لو غلط → يرجع 401 Unauthorized
  # ==========================================================
  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/authorizer/index.handler
      CodeUri: ./
      Description: Firebase Token Authorizer - verifies every request
      Timeout: 10
      MemorySize: 128
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Sub /aws/lambda/khatma-authorizer-${Environment}
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: !Ref FirebaseSSMParam

  # ==========================================================
  # ⚡ LAMBDA FUNCTION #1: Health Check
  # ==========================================================
  # أول Lambda - بس عشان نتأكد إن كل حاجة شغالة
  # مش محتاج Authorizer - عشان أي حد يقدر يجربه
  # ==========================================================
  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/health/index.handler
      CodeUri: ./
      Description: Health check endpoint - returns OK if everything is working
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Sub /aws/lambda/khatma-health-${Environment}
      Events:
        Root:
          Type: Api
          Properties:
            Path: /
            Method: get
            Auth:
              Authorizer: NONE
        HealthCheck:
          Type: Api
          Properties:
            Path: /health
            Method: get
            Auth:
              Authorizer: NONE

  # ==========================================================
  # ⚡ LAMBDA FUNCTION #2: User Management
  # ==========================================================
  # بيتعامل مع بيانات المستخدمين (sync + profile)
  # ==========================================================
  UserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/user/index.handler
      CodeUri: ./
      Description: User management - sync, get profile, update profile
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Sub /aws/lambda/khatma-user-${Environment}
      Policies:
        # الصلاحيات: يقدر يقرأ ويكتب في Users Table بس
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        SyncUser:
          Type: Api
          Properties:
            Path: /auth/sync
            Method: post
        GetMe:
          Type: Api
          Properties:
            Path: /auth/me
            Method: get
        UpdateMe:
          Type: Api
          Properties:
            Path: /auth/me
            Method: put

  # ==========================================================
  # ⚡ LAMBDA FUNCTION #3: Khatma Management (قلب المشروع)
  # ==========================================================
  # إنشاء ختمات + حجز أجزاء + إتمام أجزاء
  # ==========================================================
  KhatmaFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/khatma/index.handler
      CodeUri: ./
      Description: Khatma CRUD - create, list, details, reserve parts, complete
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Sub /aws/lambda/khatma-khatma-${Environment}
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref KhatmasTable
        - DynamoDBCrudPolicy:
            TableName: !Ref KhatmaPartsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        # SQS: permission to enqueue notification messages
        - SQSSendMessagePolicy:
            QueueName: !GetAtt NotificationsQueue.QueueName
      Events:
        CreateKhatma:
          Type: Api
          Properties:
            Path: /khatmas
            Method: post
        ListKhatmas:
          Type: Api
          Properties:
            Path: /khatmas
            Method: get
        GetKhatma:
          Type: Api
          Properties:
            Path: /khatmas/{khatmaId}
            Method: get
        ReserveParts:
          Type: Api
          Properties:
            Path: /khatmas/{khatmaId}/parts/reserve
            Method: post
        CompleteParts:
          Type: Api
          Properties:
            Path: /khatmas/{khatmaId}/parts/complete
            Method: post
        AddExtraParts:
          Type: Api
          Properties:
            Path: /khatmas/{khatmaId}/parts/add-extra
            Method: post

  # ==========================================================
  # ⚡ LAMBDA FUNCTION #4: Home Page
  # ==========================================================
  HomeFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/home/index.handler
      CodeUri: ./
      Description: Home page data - banners, my chapters summary
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Sub /aws/lambda/khatma-home-${Environment}
      Policies:
        # Read-only: Home page only reads data, never writes
        - DynamoDBReadPolicy:
            TableName: !Ref BannersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref KhatmasTable
        - DynamoDBCrudPolicy:
            TableName: !Ref KhatmaPartsTable
      Events:
        GetHome:
          Type: Api
          Properties:
            Path: /home
            Method: get
        MarkAllDone:
          Type: Api
          Properties:
            Path: /home/mark-all-done
            Method: post

  # ==========================================================
  # ⚡ LAMBDA FUNCTION #5: Notifications
  # ==========================================================
  NotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/notification/index.handler
      CodeUri: ./
      Description: Notifications - list, read, reminder settings
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Sub /aws/lambda/khatma-notification-${Environment}
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NotificationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserRemindersTable
      Events:
        ListNotifications:
          Type: Api
          Properties:
            Path: /notifications
            Method: get
        ReadAll:
          Type: Api
          Properties:
            Path: /notifications/read-all
            Method: post
        ReadOne:
          Type: Api
          Properties:
            Path: /notifications/{notificationId}/read
            Method: post
        GetReminder:
          Type: Api
          Properties:
            Path: /settings/reminder
            Method: get
        UpdateReminder:
          Type: Api
          Properties:
            Path: /settings/reminder
            Method: put

  # ==========================================================
  # ⚡ LAMBDA FUNCTION #6: App Config
  # ==========================================================
  ConfigFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/config/index.handler
      CodeUri: ./
      Description: App config - khatma types, banners
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Sub /aws/lambda/khatma-config-${Environment}
      Policies:
        # Read-only: Config endpoint is GET only, never writes
        - DynamoDBReadPolicy:
            TableName: !Ref KhatmaTypesTable
        - DynamoDBReadPolicy:
            TableName: !Ref BannersTable
      Events:
        GetConfig:
          Type: Api
          Properties:
            Path: /config
            Method: get
            Auth:
              Authorizer: NONE

  # ==========================================================
  # ⚡ LAMBDA FUNCTION #7: Invitations
  # ==========================================================
  InvitationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/invitation/index.handler
      CodeUri: ./
      Description: Invitations - send, list, accept, decline
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Sub /aws/lambda/khatma-invitation-${Environment}
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref KhatmaInvitationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref KhatmasTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        # SQS: permission to enqueue invitation notification messages
        - SQSSendMessagePolicy:
            QueueName: !GetAtt InvitationsQueue.QueueName
      Events:
        SendInvite:
          Type: Api
          Properties:
            Path: /khatmas/{khatmaId}/invite
            Method: post
        ListInvitations:
          Type: Api
          Properties:
            Path: /invitations
            Method: get
        AcceptInvitation:
          Type: Api
          Properties:
            Path: /invitations/{invitationId}/accept
            Method: post
        DeclineInvitation:
          Type: Api
          Properties:
            Path: /invitations/{invitationId}/decline
            Method: post

  # ==========================================================
  # ⚡ LAMBDA FUNCTION #8: Admin Panel
  # ==========================================================
  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/admin/index.handler
      CodeUri: ./
      Description: Admin - banners, khatma types, notification types
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Sub /aws/lambda/khatma-admin-${Environment}
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BannersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref KhatmaTypesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref NotificationTypesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        ListBanners:
          Type: Api
          Properties:
            Path: /admin/banners
            Method: get
        CreateBanner:
          Type: Api
          Properties:
            Path: /admin/banners
            Method: post
        UpdateBanner:
          Type: Api
          Properties:
            Path: /admin/banners/{bannerId}
            Method: put
        DeleteBanner:
          Type: Api
          Properties:
            Path: /admin/banners/{bannerId}
            Method: delete
        ListKhatmaTypes:
          Type: Api
          Properties:
            Path: /admin/khatma-types
            Method: get
        CreateKhatmaType:
          Type: Api
          Properties:
            Path: /admin/khatma-types
            Method: post
        UpdateKhatmaType:
          Type: Api
          Properties:
            Path: /admin/khatma-types/{typeId}
            Method: put
        DeleteKhatmaType:
          Type: Api
          Properties:
            Path: /admin/khatma-types/{typeId}
            Method: delete
        ListNotifTypes:
          Type: Api
          Properties:
            Path: /admin/notification-types
            Method: get
        CreateNotifType:
          Type: Api
          Properties:
            Path: /admin/notification-types
            Method: post
        UpdateNotifType:
          Type: Api
          Properties:
            Path: /admin/notification-types/{typeId}
            Method: put

  # ==========================================================
  # 🗄️ DynamoDB TABLE: Users
  # ==========================================================
  # جدول المستخدمين - بيحفظ بيانات كل مستخدم
  # ==========================================================
  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain            # Prevent accidental data loss on stack delete
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub khatma-users-${Environment}
      BillingMode: PAY_PER_REQUEST    # بتدفع بس لما بتستخدم
      AttributeDefinitions:
        - AttributeName: userId       # المفتاح الرئيسي
          AttributeType: S            # S = String (نص)
      KeySchema:
        - AttributeName: userId
          KeyType: HASH               # HASH = Primary Key

  # ==========================================================
  # 🗄️ DynamoDB TABLE: Khatmas
  # ==========================================================
  KhatmasTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub khatma-khatmas-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: khatmaId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: khatmaId
          KeyType: HASH
      GlobalSecondaryIndexes:
        # GSI1: عشان نجيب "ختماتي" - بحث بالـ userId
        - IndexName: userId-createdAt-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE          # RANGE = Sort Key (ترتيب)
          Projection:
            ProjectionType: ALL       # كل البيانات
        # GSI2: عشان نجيب "ختمات عامة نشطة"
        - IndexName: type-status-index
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ==========================================================
  # 🗄️ DynamoDB TABLE: Khatma Parts (30 جزء لكل ختمة)
  # ==========================================================
  KhatmaPartsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub khatma-parts-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: khatmaId
          AttributeType: S
        - AttributeName: partNumber
          AttributeType: N            # N = Number (رقم)
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: khatmaId
          KeyType: HASH               # كل الأجزاء بتاعت ختمة واحدة مع بعض
        - AttributeName: partNumber
          KeyType: RANGE              # مرتبين بالرقم 1-30
      GlobalSecondaryIndexes:
        # GSI1: عشان نجيب "أجزائي في كل الختمات"
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ==========================================================
  # 🗄️ DynamoDB TABLE: Invitations
  # ==========================================================
  KhatmaInvitationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub khatma-invitations-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: khatmaId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: khatmaId
          KeyType: HASH
        - AttributeName: email
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # GSI1: عشان نجيب "الدعوات بتاعتي" بالإيميل
        - IndexName: email-status-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ==========================================================
  # 🗄️ DynamoDB TABLE: Khatma Types (أنواع الختمات - أدمن)
  # ==========================================================
  KhatmaTypesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub khatma-types-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: typeId
          AttributeType: S
      KeySchema:
        - AttributeName: typeId
          KeyType: HASH

  # ==========================================================
  # 🗄️ DynamoDB TABLE: Banners (البانرات - أدمن)
  # ==========================================================
  BannersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub khatma-banners-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: bannerId
          AttributeType: S
      KeySchema:
        - AttributeName: bannerId
          KeyType: HASH

  # ==========================================================
  # 🗄️ DynamoDB TABLE: Notifications
  # ==========================================================
  NotificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub khatma-notifications-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: createdAt
          KeyType: RANGE

  # ==========================================================
  # 🗄️ DynamoDB TABLE: User Reminders
  # ==========================================================
  UserRemindersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub khatma-reminders-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  # ==========================================================
  # 🗄️ DynamoDB TABLE: Notification Types (قوالب الإشعارات - أدمن)
  # ==========================================================
  NotificationTypesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub khatma-notification-types-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: typeId
          AttributeType: S
      KeySchema:
        - AttributeName: typeId
          KeyType: HASH

  # ==========================================================
  # 📨 SQS QUEUE: Notifications
  # ==========================================================
  # طابور الإشعارات - الرسائل بتستنى هنا لحد ما الـ Worker يبعتها
  # ==========================================================
  NotificationsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub khatma-notifications-queue-${Environment}
      VisibilityTimeout: 180         # Must be >= 6x Lambda timeout (30s * 6 = 180s)
      MessageRetentionPeriod: 86400  # الرسائل تتحفظ يوم واحد
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt NotificationsDLQ.Arn
        maxReceiveCount: 3           # لو فشلت 3 مرات → DLQ

  # Dead Letter Queue - الرسائل اللي فشلت 3 مرات بتيجي هنا
  NotificationsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub khatma-notifications-dlq-${Environment}
      MessageRetentionPeriod: 1209600  # 14 يوم

  # ==========================================================
  # 📨 SQS QUEUE: Invitations
  # ==========================================================
  InvitationsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub khatma-invitations-queue-${Environment}
      VisibilityTimeout: 180         # Must be >= 6x Lambda timeout (30s * 6 = 180s)
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt InvitationsDLQ.Arn
        maxReceiveCount: 3

  InvitationsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub khatma-invitations-dlq-${Environment}
      MessageRetentionPeriod: 1209600

  # ==========================================================
  # 📦 S3 BUCKET: Banner Images
  # ==========================================================
  BannerImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub khatma-banner-images-${Environment}-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT]
            AllowedOrigins: ['*']
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  BannerImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref BannerImagesBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub ${BannerImagesBucket.Arn}/*

  # ==========================================================
  # 📦 S3 BUCKET: Admin Dashboard (Static Website)
  # Served via CloudFront with OAC - NOT publicly accessible directly
  # ==========================================================
  AdminDashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      # Unique name so ResourceExistenceCheck passes (old bucket name may still exist)
      BucketName: !Sub khatma-admin-app-${Environment}-${AWS::AccountId}
      # No WebsiteConfiguration - CloudFront serves the SPA, not S3 website hosting
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # CloudFront Origin Access Control - only CloudFront can read the bucket
  AdminDashboardOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub khatma-admin-oac-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution - serves the admin SPA securely
  AdminDashboardDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: AdminDashboardS3Origin
            DomainName: !GetAtt AdminDashboardBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''   # empty when using OAC
            OriginAccessControlId: !GetAtt AdminDashboardOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: AdminDashboardS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized managed policy
          AllowedMethods: [GET, HEAD, OPTIONS]
        # SPA routing: return index.html for 403/404 (React Router support)
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100  # US/Europe only - cheapest

  AdminDashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AdminDashboardBucket
      PolicyDocument:
        Statement:
          # Only allow CloudFront (via OAC) to read objects - no public access
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: 's3:GetObject'
            Resource: !Sub ${AdminDashboardBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${AdminDashboardDistribution}


  # ==========================================================
  # ⚡ LAMBDA: Upload URL Generator
  # ==========================================================
  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/upload/index.handler
      CodeUri: ./
      Description: Generate presigned URLs for image upload (admin only)
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Sub /aws/lambda/khatma-upload-${Environment}
      Environment:
        Variables:
          BANNER_IMAGES_BUCKET: !Ref BannerImagesBucket
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - S3CrudPolicy:
            BucketName: !Ref BannerImagesBucket
      Events:
        GetUploadUrl:
          Type: Api
          Properties:
            Path: /admin/upload-url
            Method: get

  # ==========================================================
  # ⚡ LAMBDA FUNCTION #10: Notification Worker (SQS Consumer)
  # ==========================================================
  # Processes messages from NotificationsQueue and sends
  # push notifications via Firebase FCM
  # ==========================================================
  NotificationWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/notification-worker/index.handler
      CodeUri: ./
      Description: SQS consumer - sends Firebase push notifications
      Timeout: 30
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Sub /aws/lambda/khatma-notif-worker-${Environment}
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref NotificationsTable
        - DynamoDBReadPolicy:
            TableName: !Ref NotificationTypesTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref NotificationsTable   # needs write to mark as sent
        - SSMParameterReadPolicy:
            ParameterName: !Ref FirebaseSSMParam
        - SQSPollerPolicy:
            QueueName: !GetAtt NotificationsQueue.QueueName
      Events:
        NotificationQueueTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt NotificationsQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures   # partial batch failure support

  # ==========================================================
  # ⚡ LAMBDA FUNCTION #11: Invitation Worker (SQS Consumer)
  # ==========================================================
  # Processes messages from InvitationsQueue and sends
  # invitation push notifications via Firebase FCM
  # ==========================================================
  InvitationWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/invitation-worker/index.handler
      CodeUri: ./
      Description: SQS consumer - sends Firebase invitation notifications
      Timeout: 30
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Sub /aws/lambda/khatma-invite-worker-${Environment}
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref KhatmaInvitationsTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - SSMParameterReadPolicy:
            ParameterName: !Ref FirebaseSSMParam
        - SQSPollerPolicy:
            QueueName: !GetAtt InvitationsQueue.QueueName
      Events:
        InvitationQueueTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt InvitationsQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures

  # LogGroups are managed via LoggingConfig inside each Lambda (SAM-native approach)
  # This avoids EarlyValidation failures from !Sub ${FunctionRef} log group names

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/

  HealthCheckUrl:
    Description: Health check URL - open in browser to test
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/health

  BannerImagesBucketUrl:
    Description: Banner images base URL
    Value: !Sub https://${BannerImagesBucket}.s3.amazonaws.com

  AdminDashboardUrl:
    Description: Admin Dashboard URL (served via CloudFront - not direct S3)
    Value: !Sub https://${AdminDashboardDistribution.DomainName}